<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ankita Dubey — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b10;
    --card: #13121a;
    --border: rgba(255,255,255,0.08);
    --text: #f2f0f8;
    --muted: #8a8799;
    --gold: #d4a843;
    --gold-dim: rgba(212,168,67,0.12);
    --rose: #e8788a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 2.5rem 2rem 2rem;
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 50%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .photo-ring {
    position: relative;
    width: 130px;
    height: 130px;
    margin-bottom: 1.25rem;
  }
  .photo-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--rose), var(--gold));
    animation: spin 6s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .photo-ring::after {
    content: '';
    position: absolute;
    inset: 0px;
    border-radius: 50%;
    background: var(--card);
  }
  .photo-ring img {
    position: absolute;
    inset: 3px;
    z-index: 1;
    width: calc(100% - 6px);
    height: calc(100% - 6px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .name em { font-style: italic; color: var(--gold); }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.6rem;
  }
  .socials {
    display: flex;
    gap: 10px;
    margin-bottom: 1.8rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .social-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    cursor: pointer;
  }
  .social-btn:hover {
    color: var(--gold);
    border-color: var(--gold);
    background: var(--gold-dim);
    transform: translateY(-2px);
  }
  .social-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
  .divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 1.5rem; }
  .projects-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .projects-label::before, .projects-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .project-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .project-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    transition: all 0.2s;
    gap: 10px;
    cursor: pointer;
  }
  .project-row:hover {
    border-color: rgba(212,168,67,0.4);
    background: var(--gold-dim);
    transform: translateX(4px);
  }
  .project-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .project-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gold); opacity: 0.6; flex-shrink: 0; }
  .project-name { font-size: 13.5px; font-weight: 500; color: var(--text); text-align: left; }
  .project-desc { font-size: 11px; color: var(--muted); text-align: left; }
  .arrow { color: var(--muted); font-size: 13px; flex-shrink: 0; transition: color 0.2s, transform 0.2s; }
  .project-row:hover .arrow { color: var(--gold); transform: translateX(3px); }
  .card-footer {
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(138,135,153,0.4);
    letter-spacing: 0.06em;
  }
</style>
</head>
